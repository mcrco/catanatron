services:
  db:
    image: postgres:18
    environment:
      - POSTGRES_USER=catanatron
      - POSTGRES_PASSWORD=victorypoint
      - POSTGRES_DB=catanatron_db
    ports:
      - 5432:5432
    volumes:
      - ./db-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -d postgresql://catanatron:victorypoint@db:5432/catanatron_db",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
  server:
    build:
      context: ..
      dockerfile: catanatron/Dockerfile.web
    environment:
      - DATABASE_URL=postgresql://catanatron:victorypoint@db:5432/catanatron_db
      - CATANATRON_PLAYER_MODULES=/app/src/catanrl/web_players.py
      - CATANRL_ROOT=/app
      - PYTHONUNBUFFERED=1
    ports:
      - 5001:5001
    stdin_open: true
    restart: always
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
  react-ui:
    build: ./ui
    ports:
      - 3000:3000
    stdin_open: true
    volumes:
      - /app/node_modules
      - ./ui:/app
